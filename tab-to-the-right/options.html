<html>
<head>
  <title>Tab To The Next Right Options</title>
  <style type="text/css">
    p {font-size:150%}
    select {font-size:80%}
    button {font-size:100%}    
  </style>
  <script src="options.js"></script>
</head>
<body>
<p>
When a new tab is created:
<select id="create">
 <option value="0">Move it only when it is far right</option>
 <option value="1">Always move</option>
 <option value="2">Do nothing</option>
</select>
<br>

When a tab is closed:
<select id="close">
 <option value="0">Do nothing</option>
 <option value="1">Select the left tab</option>
 <option value="2">Select the right tab</option>
</select>
<br>

<button id="save">Save</button>
</p>
</body>
</html>
